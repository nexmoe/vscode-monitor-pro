<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            http-equiv="Content-Security-Policy"
            content="default-src 'none'; style-src 'unsafe-inline'; script-src 'nonce-__NONCE__';"
        />
        <style>
            :root {
                --bg: var(
                    --vscode-sideBar-background,
                    var(--vscode-editor-background)
                );
                --fg: var(
                    --vscode-sideBar-foreground,
                    var(--vscode-editor-foreground)
                );
                --fg-muted: var(--vscode-descriptionForeground);
                --border: var(
                    --vscode-sideBar-border,
                    var(--vscode-editorWidget-border, transparent)
                );
                --font: var(
                    --vscode-font-family,
                    -apple-system,
                    BlinkMacSystemFont,
                    sans-serif
                );
                --font-size: var(--vscode-font-size, 13px);
                --card-bg: var(--vscode-editor-background);
                --hover-bg: var(--vscode-list-hoverBackground);
                --scrollbar-bg: var(--vscode-scrollbarSlider-background);
                --scrollbar-hover: var(
                    --vscode-scrollbarSlider-hoverBackground
                );

                --chart-cpu: var(--vscode-charts-blue);
                --chart-mem: var(--vscode-charts-green);
                --chart-netrx: var(--vscode-charts-orange);
                --chart-nettx: var(--vscode-charts-purple);
                --chart-diskrx: var(--vscode-charts-yellow);
                --chart-diskwx: var(--vscode-charts-red);
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: var(--font);
                font-size: var(--font-size);
                color: var(--fg);
                background: var(--bg);
                padding: 8px;
                overflow-x: hidden;
                user-select: none;
            }

            .card {
                background: var(--card-bg);
                border-radius: 4px;
                padding: 6px;
                margin-bottom: 6px;
            }

            .card-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 2px;
                font-size: calc(var(--font-size) - 1px);
                font-weight: 600;
                color: var(--fg-muted);
                text-transform: uppercase;
                letter-spacing: 0.3px;
            }

            .card-left {
                display: flex;
                align-items: center;
                gap: 6px;
            }

            .card-value {
                font-weight: 700;
                font-size: calc(var(--font-size) - 1px);
                color: var(--fg);
                font-variant-numeric: tabular-nums;
            }

            .toggle-group {
                display: flex;
                gap: 2px;
            }

            .toggle-btn {
                background: none;
                border: 1px solid transparent;
                color: var(--fg-muted);
                cursor: pointer;
                font-size: calc(var(--font-size) + 1px);
                line-height: 1;
                padding: 1px 4px;
                border-radius: 3px;
                opacity: 0.4;
            }

            .toggle-btn:hover {
                opacity: 0.8;
                background: var(--hover-bg);
            }

            .toggle-btn.active {
                opacity: 1;
                background: var(--card-bg);
                border-color: var(--border);
            }

            .chart-wrap {
                width: 100%;
                height: 56px;
            }

            .chart-wrap canvas {
                width: 100%;
                height: 100%;
                display: block;
            }

            .bar-wrap {
                width: 100%;
                height: 20px;
                padding: 6px 0;
            }

            .bar-row {
                display: flex;
                align-items: center;
                gap: 4px;
            }

            .bar-track {
                flex: 1;
                height: 8px;
                background: rgba(128, 128, 128, 0.12);
                border-radius: 4px;
                overflow: hidden;
            }

            .bar-fill {
                height: 100%;
                border-radius: 4px;
                min-width: 2px;
            }

            .bar-label {
                font-size: calc(var(--font-size) - 2px);
                color: var(--fg-muted);
                font-variant-numeric: tabular-nums;
                white-space: nowrap;
                flex-shrink: 0;
            }
        </style>
    </head>
    <body>
        <div id="app"></div>

        <script nonce="__NONCE__">
            (function () {
                "use strict";

                // -------- metric definitions --------

                const METRICS = [
                    {
                        id: "cpu",
                        label: "CPU",
                        cssVar: "--chart-cpu",
                        isRate: false,
                        isMem: true,
                    },
                    {
                        id: "memActive",
                        label: "Memory (Active)",
                        cssVar: "--chart-mem",
                        isRate: false,
                        isMem: true,
                    },
                    {
                        id: "memUsed",
                        label: "Memory (Used)",
                        cssVar: "--chart-mem",
                        isRate: false,
                        isMem: true,
                    },
                    {
                        id: "netRx",
                        label: "Network \u2193",
                        cssVar: "--chart-netrx",
                        isRate: true,
                        isMem: false,
                    },
                    {
                        id: "netTx",
                        label: "Network \u2191",
                        cssVar: "--chart-nettx",
                        isRate: true,
                        isMem: false,
                    },
                    {
                        id: "diskRx",
                        label: "Disk \u2193",
                        cssVar: "--chart-diskrx",
                        isRate: true,
                        isMem: false,
                    },
                    {
                        id: "diskWx",
                        label: "Disk \u2191",
                        cssVar: "--chart-diskwx",
                        isRate: true,
                        isMem: false,
                    },
                ];

                const getId = (id, suffix) => id + "-" + suffix;

                // -------- color helpers --------

                function getCSSVar(name) {
                    return getComputedStyle(document.documentElement)
                        .getPropertyValue(name)
                        .trim();
                }

                const COLORS = {};
                for (const m of METRICS) COLORS[m.id] = getCSSVar(m.cssVar);

                const FG = getCSSVar("--vscode-editor-foreground");

                function hexToRgb(hex) {
                    const m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(
                        hex,
                    );
                    return m
                        ? {
                              r: parseInt(m[1], 16),
                              g: parseInt(m[2], 16),
                              b: parseInt(m[3], 16),
                          }
                        : null;
                }

                function rgba(color, a) {
                    const rgb = hexToRgb(color);
                    return rgb
                        ? "rgba(" +
                              rgb.r +
                              "," +
                              rgb.g +
                              "," +
                              rgb.b +
                              "," +
                              a +
                              ")"
                        : "rgba(128,128,128," + a + ")";
                }

                // -------- formatting --------

                function formatRate(v) {
                    if (v < 1) return "0 B/s";
                    const units = ["B/s", "KiB/s", "MiB/s", "GiB/s"];
                    let i = 0;
                    let val = v;
                    while (val >= 1024 && i < units.length - 1) {
                        val /= 1024;
                        i++;
                    }
                    // Use 2 significant digits, matching backend byteFormat({minimumSignificantDigits:2,maximumSignificantDigits:2})
                    const s = val >= 100 ? val.toFixed(0) : val.toPrecision(2);
                    return s + " " + units[i];
                }

                // -------- state --------

                const state = {
                    viewMode: {},
                    history: {},
                    barMax: {},
                };

                for (const m of METRICS) {
                    state.viewMode[m.id] = "line";
                    state.history[m.id] = [];
                    state.barMax[m.id] = 1;
                }

                // -------- build DOM --------

                const app = document.getElementById("app");

                function buildCards() {
                    let html = "";
                    for (const m of METRICS) {
                        html +=
                            '<div class="card">' +
                            '<div class="card-header">' +
                            '<div class="card-left">' +
                            "<span>" +
                            m.label +
                            "</span>" +
                            '<span class="card-value" id="' +
                            getId(m.id, "val") +
                            '">\u2014</span>' +
                            "</div>" +
                            '<div class="toggle-group">' +
                            '<button class="toggle-btn active" data-metric="' +
                            m.id +
                            '" data-view="line" title="Line chart">\u25E0</button>' +
                            '<button class="toggle-btn" data-metric="' +
                            m.id +
                            '" data-view="bar" title="Bar">\u25A4</button>' +
                            "</div>" +
                            "</div>" +
                            '<div class="chart-wrap" id="' +
                            getId(m.id, "chart-wrap") +
                            '">' +
                            '<canvas id="' +
                            getId(m.id, "canvas") +
                            '"></canvas>' +
                            "</div>" +
                            '<div class="bar-wrap" id="' +
                            getId(m.id, "bar-wrap") +
                            '" style="display:none">' +
                            '<div class="bar-row">' +
                            '<div class="bar-track">' +
                            '<div class="bar-fill" id="' +
                            getId(m.id, "bar-fill") +
                            '" style="width:0%;background:' + COLORS[m.id] + '"></div>' +
                            "</div>" +
                            '<span class="bar-label" id="' +
                            getId(m.id, "bar-label") +
                            '">\u2014</span>' +
                            "</div>" +
                            "</div>" +
                            "</div>";
                    }
                    app.innerHTML = html;
                }
                buildCards();

                // -------- DOM references --------

                const canvases = {};
                const chartWraps = {};
                const barWraps = {};
                const barFills = {};
                const barLabels = {};
                const valueEls = {};

                for (const m of METRICS) {
                    const id = m.id;
                    canvases[id] = document.getElementById(getId(id, "canvas"));
                    chartWraps[id] = document.getElementById(
                        getId(id, "chart-wrap"),
                    );
                    barWraps[id] = document.getElementById(
                        getId(id, "bar-wrap"),
                    );
                    barFills[id] = document.getElementById(
                        getId(id, "bar-fill"),
                    );
                    barLabels[id] = document.getElementById(
                        getId(id, "bar-label"),
                    );
                    valueEls[id] = document.getElementById(getId(id, "val"));
                }

                // -------- view toggle --------

                document.addEventListener("click", function (e) {
                    const btn = e.target.closest(".toggle-btn");
                    if (!btn) return;
                    const metric = btn.dataset.metric;
                    const view = btn.dataset.view;
                    if (!metric || !view) return;

                    state.viewMode[metric] = view;

                    const group = btn.parentElement;
                    for (const child of group.children) {
                        child.classList.toggle(
                            "active",
                            child.dataset.view === view,
                        );
                    }

                    chartWraps[metric].style.display =
                        view === "line" ? "" : "none";
                    barWraps[metric].style.display =
                        view === "bar" ? "" : "none";

                    if (view === "bar") {
                        updateBar(metric);
                    } else if (state.history[metric].length >= 2) {
                        drawChart(
                            metric,
                            state.history[metric],
                            COLORS[metric],
                        );
                    }
                });

                // -------- data helpers --------

                function extractHistory(history, id) {
                    const vals = [];
                    for (const dp of history) {
                        let v;
                        if (id === "cpu") v = dp.cpu;
                        else if (id === "memActive")
                            v = (dp.memoryActive / dp.memoryTotal) * 100;
                        else if (id === "memUsed")
                            v = (dp.memoryUsed / dp.memoryTotal) * 100;
                        else if (id === "netRx") v = dp.networkRx;
                        else if (id === "netTx") v = dp.networkTx;
                        else if (id === "diskRx") v = dp.diskRx;
                        else if (id === "diskWx") v = dp.diskWx;
                        else v = 0;
                        vals.push(v);
                    }
                    return vals;
                }

                // -------- line chart drawing --------

                function drawChart(id, history, color) {
                    const canvas = canvases[id];
                    const ctx = canvas.getContext("2d");
                    const rect = canvas.getBoundingClientRect();
                    const dpr = window.devicePixelRatio || 1;
                    const w = rect.width;
                    const h = rect.height;

                    if (w === 0 || h === 0) return;

                    canvas.width = w * dpr;
                    canvas.height = h * dpr;
                    ctx.scale(dpr, dpr);
                    ctx.clearRect(0, 0, w, h);

                    const padTop = 4;
                    const padBot = 4;
                    const drawH = h - padTop - padBot;

                    let dataMin, dataMax;
                    const metric = METRICS.find(function (m) {
                        return m.id === id;
                    });
                    if (metric && !metric.isRate) {
                        dataMin = 0;
                        dataMax = 100;
                    } else {
                        dataMin = 0;
                        dataMax =
                            history.length > 0
                                ? Math.max(1, ...history) * 1.15
                                : 1;
                    }

                    if (dataMax === dataMin) dataMax = dataMin + 10;
                    const range = dataMax - dataMin;
                    const n = history.length;

                    if (n < 2) return;

                    function yPos(val) {
                        return (
                            padTop + drawH - ((val - dataMin) / range) * drawH
                        );
                    }

                    const xStep = w / (n - 1);

                    // grid
                    ctx.strokeStyle = rgba(FG, 0.06);
                    ctx.lineWidth = 1;
                    for (let i = 0; i <= 4; i++) {
                        const y = padTop + (drawH / 4) * i;
                        ctx.beginPath();
                        ctx.moveTo(0, y);
                        ctx.lineTo(w, y);
                        ctx.stroke();
                    }

                    // gradient fill
                    const grad = ctx.createLinearGradient(
                        0,
                        padTop,
                        0,
                        padTop + drawH,
                    );
                    grad.addColorStop(0, rgba(color, 0.18));
                    grad.addColorStop(1, rgba(color, 0.02));
                    ctx.beginPath();
                    curvePath(ctx, history, xStep, yPos);
                    ctx.lineTo((n - 1) * xStep, padTop + drawH);
                    ctx.lineTo(0, padTop + drawH);
                    ctx.closePath();
                    ctx.fillStyle = grad;
                    ctx.fill();

                    // smooth line
                    ctx.beginPath();
                    curvePath(ctx, history, xStep, yPos);
                    ctx.strokeStyle = color;
                    ctx.lineWidth = 1.8;
                    ctx.lineJoin = "round";
                    ctx.lineCap = "round";
                    ctx.stroke();

                    // current value label (top-right)
                    const last = history[n - 1];
                    const label =
                        metric && !metric.isRate
                            ? last.toFixed(1) + "%"
                            : formatRate(last);
                    ctx.fillStyle = color;
                    ctx.font =
                        "bold " +
                        Math.round(h * 0.24) +
                        "px var(--vscode-font-family, sans-serif)";
                    ctx.textAlign = "right";
                    ctx.textBaseline = "top";
                    ctx.fillText(label, w - 2, padTop + 2);

                    // scale label (top-left, rate metrics only)
                    if (metric && metric.isRate) {
                        ctx.fillStyle = rgba(FG, 0.25);
                        ctx.font =
                            Math.round(h * 0.16) +
                            "px var(--vscode-font-family, sans-serif)";
                        ctx.textAlign = "left";
                        ctx.textBaseline = "top";
                        ctx.fillText(formatRate(dataMax), 2, padTop + 2);
                    }
                }

                function curvePath(ctx, data, xStep, yPos) {
                    const n = data.length;
                    ctx.moveTo(0, yPos(data[0]));
                    for (let i = 1; i < n - 1; i++) {
                        const mx = (i * xStep + (i + 1) * xStep) / 2;
                        const my = (yPos(data[i]) + yPos(data[i + 1])) / 2;
                        ctx.quadraticCurveTo(i * xStep, yPos(data[i]), mx, my);
                    }
                    ctx.lineTo((n - 1) * xStep, yPos(data[n - 1]));
                }

                // -------- bar updates --------

                function updateBar(id) {
                    const pct = getBarPercent(id);
                    barFills[id].style.width = Math.min(100, pct) + "%";

                    const metric = METRICS.find(function (m) {
                        return m.id === id;
                    });
                    if (metric && metric.isRate) {
                        barLabels[id].textContent = formatRate(
                            state.barMax[id],
                        );
                    } else {
                        barLabels[id].textContent = "100%";
                    }
                }

                function getBarPercent(id) {
                    const hist = state.history[id];
                    const val = hist.length > 0 ? hist[hist.length - 1] : 0;
                    const metric = METRICS.find(function (m) {
                        return m.id === id;
                    });
                    if (!metric || !metric.isRate) {
                        return Math.min(100, val);
                    }
                    const maxVal = state.barMax[id];
                    return maxVal > 0 ? (val / maxVal) * 100 : 0;
                }

                // -------- handle data --------

                function handleUpdate(data) {
                    const h = data.history;
                    if (!h || h.length < 1) return;

                    const fmt = data.formatted;

                    for (const m of METRICS) {
                        const id = m.id;

                        // update history (no animation)
                        state.history[id] = extractHistory(h, id);

                        // update bar max for rate metrics
                        if (m.isRate) {
                            const vals = state.history[id];
                            state.barMax[id] = Math.max(1, ...vals) * 1.15;
                        }

                        // update text value
                        valueEls[id].textContent = fmt[id] || "\u2014";

                        // redraw
                        if (state.viewMode[id] === "line") {
                            drawChart(id, state.history[id], COLORS[id]);
                        } else {
                            updateBar(id);
                        }
                    }
                }

                // -------- resize observer --------

                const ro = new ResizeObserver(function () {
                    for (const m of METRICS) {
                        if (
                            state.viewMode[m.id] === "line" &&
                            state.history[m.id].length >= 2
                        ) {
                            drawChart(m.id, state.history[m.id], COLORS[m.id]);
                        }
                    }
                });

                for (const m of METRICS) {
                    if (canvases[m.id]) ro.observe(canvases[m.id]);
                }

                // -------- message handler --------

                window.addEventListener("message", function (e) {
                    const msg = e.data;
                    if (msg.type === "update" && msg.data) {
                        handleUpdate(msg.data);
                    }
                });
            })();
        </script>
    </body>
</html>
