name: Package Extension

on:
    push:
        tags:
            - "[0-9]+.[0-9]+.[0-9]+.dev.[0-9]+"
    workflow_dispatch:

permissions:
    contents: write

jobs:
    package:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: latest

            - name: Get pnpm store directory
              shell: bash
              run: |
                  echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

            - name: Setup pnpm cache
              uses: actions/cache@v4
              with:
                  path: ${{ env.STORE_PATH }}
                  key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
                  restore-keys: |
                      ${{ runner.os }}-pnpm-store-

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build extension
              run: pnpm run package

            - name: Install vsce
              run: pnpm add -g @vscode/vsce

            - name: Get version info
              id: get_version
              run: |
                  if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                    VERSION=$(node -p "require('./package.json').version")
                    echo "Manual run - using package.json version: $VERSION"
                  else
                    VERSION=${GITHUB_REF#refs/tags/}
                    echo "Tag triggered - using tag version: $VERSION"
                  fi
                  echo "version=$VERSION" >> $GITHUB_OUTPUT

            - name: Show version info
              run: |
                  PACKAGE_VERSION=$(node -p "require('./package.json').version")
                  TAG_VERSION="${{ steps.get_version.outputs.version }}"
                  echo "Package.json version: $PACKAGE_VERSION"
                  echo "Current version: $TAG_VERSION"
                  echo "ℹ️ Development versions don't require exact version matching"

            - name: Package extension
              run: |
                  pnpm vsce package --no-dependencies

            - name: Create development release (for tag runs only)
              if: github.event_name != 'workflow_dispatch'
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.get_version.outputs.version }}
                  name: "Monitor Pro v${{ steps.get_version.outputs.version }} (开发版)"
                  body: |
                      # 🚧 开发版本 - 仅供测试

                      这是一个开发版本，用于内部测试。请不要在生产环境中使用。

                      ## 版本信息
                      - 版本号: ${{ steps.get_version.outputs.version }}
                      - 构建时间: ${{ github.run_id }}
                      - 提交: ${{ github.sha }}

                      ## 注意事项
                      ⚠️ 此版本不会发布到 VSCode 市场
                      ⚠️ 仅通过 GitHub Release 提供下载
                      ⚠️ 可能包含未经充分测试的功能

                      ---

                      📦 **安装方式：** 下载 .vsix 文件并在 VSCode 中手动安装
                  files: |
                      *.vsix
                  draft: false
                  prerelease: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Upload VSIX artifact
              uses: actions/upload-artifact@v4
              with:
                  name: vsix-package-${{ steps.get_version.outputs.version }}
                  path: "*.vsix"
                  retention-days: 30
