name: Package Extension

on:
    push:
        tags:
            - '[0-9]+.[0-9]+.[0-9]+.dev.[0-9]+'
    workflow_dispatch:

permissions:
    contents: write

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
    package:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: ./.github/actions/setup

            - uses: actions/setup-go@v5
              with:
                  go-version: '1.26'
                  cache-dependency-path: go-backend/go.sum

            - name: Get version info
              id: get_version
              run: |
                  if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                    VERSION=$(node -p "require('./package.json').version")
                  else
                    VERSION=${GITHUB_REF#refs/tags/}
                  fi
                  echo "version=$VERSION" >> $GITHUB_OUTPUT

            - name: Build universal package
              run: pnpm run package:vsix:universal

            - name: Build Windows x64 package
              run: pnpm run package:vsix:win32-x64

            - name: Restore .vscodeignore after Windows x64
              run: git checkout .vscodeignore

            - name: Build Windows arm64 package
              run: pnpm run package:vsix:win32-arm64

            - name: List packages
              run: ls -lh monitor-pro-*.vsix

            - name: Create development release
              if: github.event_name != 'workflow_dispatch'
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.get_version.outputs.version }}
                  name: 'Monitor Pro v${{ steps.get_version.outputs.version }} (开发版)'
                  body: |
                      # 🚧 开发版本 - 仅供测试

                      这是一个开发版本，用于内部测试。请不要在生产环境中使用。

                      - **版本号**: ${{ steps.get_version.outputs.version }}
                      - **构建时间**: ${{ github.run_id }}
                      - **提交**: ${{ github.sha }}

                      ⚠️ 此版本不会发布到 VSCode 市场，仅通过 GitHub Release 提供下载。

                      📦 **安装方式**: 下载对应平台的 .vsix 文件并在 VSCode 中手动安装

                      | 包名 | 适用平台 |
                      |------|----------|
                      | `monitor-pro-universal.vsix` | macOS / Linux |
                      | `monitor-pro-win32-x64.vsix` | Windows x64 |
                      | `monitor-pro-win32-arm64.vsix` | Windows ARM64 |
                  files: |
                      monitor-pro-universal.vsix
                      monitor-pro-win32-x64.vsix
                      monitor-pro-win32-arm64.vsix
                  draft: false
                  prerelease: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - uses: actions/upload-artifact@v4
              with:
                  name: vsix-${{ steps.get_version.outputs.version }}
                  path: 'monitor-pro-*.vsix'
                  retention-days: 30
