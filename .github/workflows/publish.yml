name: Publish Extension

on:
    push:
        tags:
            - '[0-9]+.[0-9]+.[0-9]+'

permissions:
    contents: write

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
    group: publish-extension-${{ github.ref }}
    cancel-in-progress: false

jobs:
    publish:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: ./.github/actions/setup

            - uses: actions/setup-go@v5
              with:
                  go-version: '1.26'
                  cache-dependency-path: go-backend/go.sum

            - name: Verify Go tests
              run: pnpm run go:test

            - name: Get tag version
              id: get_version
              run: |
                  VERSION=${GITHUB_REF#refs/tags/}
                  echo "version=$VERSION" >> $GITHUB_OUTPUT

            - name: Verify version match
              run: |
                  PKG_VER=$(node -p "require('./package.json').version")
                  TAG_VER="${{ steps.get_version.outputs.version }}"
                  echo "package.json: $PKG_VER | tag: $TAG_VER"
                  if [ "$PKG_VER" != "$TAG_VER" ]; then
                    echo "::error::package.json version ($PKG_VER) must match git tag ($TAG_VER)"
                    exit 1
                  fi

            - name: Verify marketplace token
              env:
                  VSCE_PAT: ${{ secrets.VSCE_PAT }}
              run: |
                  if [ -z "$VSCE_PAT" ]; then
                    echo "::error::Missing GitHub Actions secret VSCE_PAT. Create an Azure DevOps Marketplace PAT and save it as VSCE_PAT."
                    exit 1
                  fi

            - name: Package universal & publish
              run: pnpm exec vsce package --no-dependencies --out monitor-pro-${{ steps.get_version.outputs.version }}.vsix
              env:
                  VSCE_PAT: ${{ secrets.VSCE_PAT }}

            - name: Publish to VSCode Marketplace (universal)
              run: pnpm run deploy
              env:
                  VSCE_PAT: ${{ secrets.VSCE_PAT }}

            - name: Build Windows x64 binary
              run: pnpm run go:build:win32-x64

            - name: Package Windows x64
              run: sed -i '/^go-backend\/bin/d' .vscodeignore && pnpm exec vsce package --no-dependencies --target win32-x64 -o monitor-pro-win32-x64-${{ steps.get_version.outputs.version }}.vsix

            - name: Publish to VSCode Marketplace (win32-x64)
              run: pnpm exec vsce publish --no-dependencies --target win32-x64 --packagePath monitor-pro-win32-x64-${{ steps.get_version.outputs.version }}.vsix
              env:
                  VSCE_PAT: ${{ secrets.VSCE_PAT }}

            - name: Restore .vscodeignore
              run: git checkout .vscodeignore

            - name: Build Windows arm64 binary
              run: pnpm run go:build:win32-arm64

            - name: Package Windows arm64
              run: sed -i '/^go-backend\/bin/d' .vscodeignore && pnpm exec vsce package --no-dependencies --target win32-arm64 -o monitor-pro-win32-arm64-${{ steps.get_version.outputs.version }}.vsix

            - name: Publish to VSCode Marketplace (win32-arm64)
              run: pnpm exec vsce publish --no-dependencies --target win32-arm64 --packagePath monitor-pro-win32-arm64-${{ steps.get_version.outputs.version }}.vsix
              env:
                  VSCE_PAT: ${{ secrets.VSCE_PAT }}

            - name: Find previous tag
              id: previous_tag
              run: |
                  CUR="${{ steps.get_version.outputs.version }}"
                  PREV=$(git tag -l --sort=-version:refname | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | grep -v "^$CUR$" | head -n1)
                  echo "previous_tag=$PREV" >> $GITHUB_OUTPUT

            - name: Generate release notes
              id: release_notes
              run: |
                  CUR="${{ steps.get_version.outputs.version }}"
                  PREV="${{ steps.previous_tag.outputs.previous_tag }}"

                  echo "# VSCode Monitor Pro v$CUR" > release_notes.md

                  if [ -f CHANGELOG.md ]; then
                    echo "## What's Changed" >> release_notes.md
                    awk -v v="$CUR" '/^##/{if(f)exit; if($0~v)f=1;next} f&&/^##/{exit} f{print}' CHANGELOG.md >> release_notes.md
                  fi

                  echo "" >> release_notes.md
                  if [ -n "$PREV" ]; then
                    echo "[Compare with $PREV](https://github.com/${{ github.repository }}/compare/$PREV...$CUR)" >> release_notes.md
                  fi

                  echo "" >> release_notes.md
                  echo "---" >> release_notes.md
                  echo "**Installation:**" >> release_notes.md
                  echo "- Install from the VS Code Marketplace by searching for \"Monitor Pro\"" >> release_notes.md
                  echo "- Or download the .vsix file below to install manually" >> release_notes.md

            - uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.get_version.outputs.version }}
                  name: 'Monitor Pro v${{ steps.get_version.outputs.version }}'
                  body_path: release_notes.md
                  files: |
                      monitor-pro-${{ steps.get_version.outputs.version }}.vsix
                      monitor-pro-win32-x64-${{ steps.get_version.outputs.version }}.vsix
                      monitor-pro-win32-arm64-${{ steps.get_version.outputs.version }}.vsix
                  draft: false
                  prerelease: false
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - uses: actions/upload-artifact@v4
              with:
                  name: vsix-${{ steps.get_version.outputs.version }}
                  path: 'monitor-pro-*.vsix'
                  retention-days: 90
